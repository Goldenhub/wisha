  <line x1="22" y1="14" x2="16" y2="4" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="6" y1="26" x2="26" y2="26" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="8" y1="20" x2="24" y2="20" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Confetti dots -->
  <circle cx="6" cy="6" r="2" fill="#fbbf24"/>
  <circle cx="26" cy="8" r="1.5" fill="#34d399"/>
  <circle cx="4" cy="12" r="1" fill="#f472b6"/>
